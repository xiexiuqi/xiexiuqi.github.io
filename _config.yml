title: Linux内核与系统性能优化
description: Linux 内核与系统性能优化技术分享
author: ""
email: ""

# Jekyll 配置
theme: minima
baseurl: ""
url: "https://xiexiuqi.github.io"

# 分页配置
paginate: 10
paginate_path: "/page:num/"

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 构建配置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  openeuler_reviews:
    output: true
    permalink: /openeuler/reviews/:path/

# 默认配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "openeuler_reviews"
    values:
      layout: "none"
